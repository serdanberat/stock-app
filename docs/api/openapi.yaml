          description: "TBD Phase 7."
    ReceiptResponse:
      type: object
      description: "TBD Phase 7. Fields: sale_id, items, totals, payment, store_info, receipt_url"

    # Returns
    ReturnResponse:
      type: object
      description: "TBD Phase 7. Fields: id, mode, status, original_sale_id, customer_party_id, return_lines, exchange_lines, refund_tender, settlement_delta, correlation_id"
