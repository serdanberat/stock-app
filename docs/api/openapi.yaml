    TopSellingQuery:
      type: object
      description: "TBD Phase 7."
    TopSellingResponse:
      type: object
      description: "TBD Phase 7."
    CustomerAgingQuery:
      type: object
      description: "TBD Phase 7."
    CustomerAgingResponse:
      type: object
      description: "TBD Phase 7."
    MarkupAnalysisQuery:
      type: object
      description: "TBD Phase 7."
    MarkupAnalysisResponse:
      type: object
      description: "TBD Phase 7. Formula: (price - WAC) / WAC × 100. Per 3.F: 'Markup' not 'Margin'."

    # Audit
    AuditEventResponse:
      type: object
      description: "TBD Phase 7. Fields: id, event_type, occurred_at, actor_user_id, actor_user_name, summary, correlation_id, payload_preview"
    AuditEventDetailResponse:
      type: object
      description: "TBD Phase 7. Includes full payload (PII-masked per viewer permissions; 3.F.8)."
    SearchAuditLogRequest:
      allOf:
        - $ref: '#/components/schemas/PageRequest'
        - type: object

    # Jobs (async)
    ExportJobResponse:
      type: object
      required: [job_id, status, poll_url]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED]
        poll_url:
          type: string
        expected_completion_seconds:
          type: integer
    ExportJobStatusResponse:
      type: object
      description: "TBD Phase 7. Fields: job_id, status, progress, download_url? (when COMPLETED), failure_reason? (when FAILED)"

    # Health
    HealthResponse:
      type: object
      description: "TBD Phase 7."
    ReadinessResponse:
      type: object
      description: "TBD Phase 7."

