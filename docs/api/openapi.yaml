  - name: catalog-products
    description: Product catalog
  - name: catalog-variants
    description: Product variants
  - name: catalog-other
    description: Brands, categories, attributes, missing items
  - name: pricing
    description: Price lists & store overrides
  - name: inventory-stock
    description: Stock balances & queries
  - name: inventory-movements
    description: Movement history
  - name: inventory-transfers
    description: Stock transfers
  - name: inventory-counts
    description: Stock count sessions
  - name: inventory-adjustments
    description: Stock adjustments
  - name: purchasing
    description: Purchase invoices
  - name: finance-parties
    description: Customers & suppliers
  - name: finance-accounts
    description: Account balances & movements
  - name: finance-payments
    description: Payment collection (customer/supplier)
  - name: cashregister
    description: Cash register sessions & Z reports
  - name: reports
    description: Reports & CSV exports
  - name: audit
    description: Audit log browser
  - name: admin-users
    description: User & role administration
  - name: admin-tenant
    description: Tenant settings & stores
  - name: cross-cutting
    description: Health, jobs, observability

# ============================================================================
# Paths
# ============================================================================
# Note: paths section is illustrative — first ~20 endpoints shown with full
# detail (request/response refs); remaining endpoints follow the same pattern
# and are listed in `05-endpoint-catalogue.md`. Full path expansion deferred 
# to Phase 7 implementation where the OpenAPI is generated alongside controllers.
paths:

  # ==========================================================================
  # Authentication
  # ==========================================================================
  /auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []  # public
      x-permission: (public)
      x-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [auth]
      operationId: refreshToken
      security: []
      x-permission: (public)
      x-idempotent: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/manager-pin-verify:
    post:
      tags: [auth]
      operationId: verifyManagerPin
      x-permission: (any authenticated)
      x-idempotent: false
      x-screen-ref: "3.A.4"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyManagerPinRequest'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagerOverrideTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          description: Manager PIN locked (3-fail lockout)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  # ==========================================================================
  # POS sales (3.A flow)
  # ==========================================================================
  /pos/sales:
    post:
      tags: [pos]
      operationId: createSale
      x-permission: sales.create
      x-idempotent: true
      x-screen-ref: "3.A.1"
      x-aggregate: Sale
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSaleRequest'
      responses:
        '201':
          description: Sale DRAFT created
          headers:
            Location:
              schema: { type: string }
            X-Correlation-Id:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /pos/sales/{id}/complete:
    post:
      tags: [pos]
      operationId: completeSale
      x-permission: sales.complete
      x-idempotent: true
      x-screen-ref: "3.A.5"
      x-aggregate: Sale
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteSaleRequest'
      responses:
        '200':
          description: Sale completed (atomic: inventory + cashregister + finance writes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleResponse'
        '422':
          description: Domain rule violation (insufficient stock, credit limit exceeded, etc.)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  # ==========================================================================
  # Purchase invoice commit (3.D.2)
  # ==========================================================================
  /finance/purchase-invoices/{id}/commit:
    post:
      tags: [purchasing]
      operationId: commitPurchaseInvoice
      x-permission: purchasing.invoices.commit
      x-idempotent: true
      x-screen-ref: "3.D.2"
      x-aggregate: PurchaseInvoice
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitPurchaseInvoiceRequest'
      responses:
        '200':
          description: Atomic commit applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseInvoiceResponse'
        '409':
          description: Supplier invoice number duplicate
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  # ==========================================================================
  # Inventory transfer dispatch / receive (3.C.3)
  # ==========================================================================
  /inventory/transfers/{id}/dispatch:
    post:
      tags: [inventory-transfers]
      operationId: dispatchTransfer
      x-permission: inventory.transfers.dispatch
      x-idempotent: true
      x-screen-ref: "3.C.3"
      x-aggregate: Transfer
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchTransferRequest'
      responses:
        '200':
          description: DRAFT → DISPATCHED, source TRANSFER_OUT movements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /inventory/transfers/{id}/receive:
    post:
      tags: [inventory-transfers]
      operationId: receiveTransfer
      x-permission: inventory.transfers.receive
      x-idempotent: true
      x-screen-ref: "3.C.3"
      x-aggregate: Transfer
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiveTransferRequest'
      responses:
        '200':
          description: IN_TRANSIT → RECEIVED, atomic target TRANSFER_IN + optional ADJUSTMENT_OUT for discrepancy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  # ==========================================================================
  # Cash register open / close (3.E.1, 3.E.2)
  # ==========================================================================
  /cash-register/open:
    post:
      tags: [cashregister]
      operationId: openCashRegister
      x-permission: cashregister.open
      x-idempotent: true
      x-screen-ref: "3.E.1"
      x-aggregate: CashRegisterSession
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenCashRegisterRequest'
      responses:
        '201':
          description: Session opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSessionResponse'
        '409':
          description: Session already open or orphan session exists
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /cash-register/sessions/{id}/close:
    post:
      tags: [cashregister]
      operationId: closeCashRegister
      x-permission: cashregister.close
      x-idempotent: true
      x-screen-ref: "3.E.2"
      x-aggregate: CashRegisterSession
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseCashRegisterRequest'
      responses:
        '200':
          description: Session closed; Z report queued for generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashRegisterSessionResponse'
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  # ==========================================================================
  # Return finalize (3.D.4)
  # ==========================================================================
  /finance/returns/{id}/finalize:
    post:
      tags: [returns]
      operationId: finalizeReturn
      x-permission: returns.process
      x-idempotent: true
      x-screen-ref: "3.D.4"
      x-aggregate: Return
      parameters:
        - $ref: '#/components/parameters/PathId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeReturnRequest'
      responses:
        '200':
          description: Return finalized; stock back-in + refund tender posted + exchange Sale created if applicable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnResponse'
        '422':
          description: Domain rule (refund tender not allowed, etc.)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  # ==========================================================================
  # Pricing resolve (POS critical path)
  # ==========================================================================
  /pricing/resolve:
    get:
      tags: [pricing]
      operationId: resolvePrice
      x-permission: (any with catalog read)
      x-idempotent: false
      x-screen-ref: "3.A.1"
      parameters:
        - name: variant_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: store_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Resolved price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedPriceResponse'
        '404':
          description: No active price for this variant+store
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  # ==========================================================================
  # Remaining ~150 endpoints follow the same patterns. 
  # See `05-endpoint-catalogue.md` for the full list.
  # Phase 7 generates full OpenAPI from controllers with springdoc-openapi.
  # ==========================================================================
