openapi: 3.1.0
info:
  title: stockapp API
  version: 0.1.0-mvp
  description: |
    Multi-tenant retail POS/ERP API for clothing/boutique/jewelry stores.
    
    **Phase 5 status**: skeleton (paths + schema names; properties to be detailed in Phase 7).
    
    **Conventions**: see `docs/api/05-api-conventions.md`.
    - All write endpoints require `X-Idempotency-Key` header (UUID).
    - All responses include `X-Correlation-Id` header.
    - Errors use RFC 7807 `application/problem+json`.
    - Authentication: JWT Bearer (`Authorization: Bearer <token>`).
    - Tenant isolation enforced via JWT claim → RLS context.
  contact:
    name: stockapp
  license:
    name: Proprietary

servers:
  - url: https://api.stockapp.example/v1
    description: Production (placeholder)
  - url: http://localhost:8080
    description: Local development

# ============================================================================
# Security
# ============================================================================
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by `/auth/login`. HS256 per ADR-013.
        15min access token; refresh via `/auth/refresh`.

  # ==========================================================================
  # Common parameters
  # ==========================================================================
  parameters:
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: true
      description: |
        Client-generated UUIDv4. Required for write-consequential endpoints.
        7-day retention. Same key returns cached response.
      schema:
        type: string
        format: uuid
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: |
        Optional client-supplied correlation ID for request tracing.
        If absent, server generates one. Always echoed in response.
      schema:
        type: string
        format: uuid
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # ==========================================================================
  # Common response shapes
  # ==========================================================================
  responses:
    ProblemResponse:
      description: Error per RFC 7807
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NoContent:
      description: Success with no body
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Insufficient permissions
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Uniqueness or concurrency conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Domain rule violation
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  # ==========================================================================
  # Common schemas
  # ==========================================================================
  schemas:
    # ----- Error model (RFC 7807) -----
    Problem:
      type: object
      description: RFC 7807 problem+json. See `docs/api/05-api-conventions.md` for full error catalog.
      required: [type, title, status, errorCode]
      properties:
        type:
          type: string
          format: uri
          description: |
            Stable problem type URI. Format: 
            `https://api.stockapp.example/problems/<error-code-slug>`.
            URLs survive across API versions.
          example: "https://api.stockapp.example/problems/insufficient-stock"
        title:
          type: string
          description: Short human-readable summary (stable per type).
          example: "Insufficient Stock"
        status:
          type: integer
          description: HTTP status code (stable per type).
          example: 422
        detail:
          type: string
          description: Runtime-specific description (may contain dynamic values).
        instance:
          type: string
          description: Request path.
        errorCode:
          type: string
          description: |
            Stable enum value (e.g., `INV_INSUFFICIENT_STOCK`). 
            Clients switch on this. See error catalog in conventions doc.
        context:
          type: object
          additionalProperties: true
          description: Structured runtime context (variant_id, available, requested, etc.). Schema may evolve.
        correlationId:
          type: string
          format: uuid
          description: Same as `X-Correlation-Id` response header.

    # ----- Pagination -----
    PageRequest:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        sort:
          type: string
          description: Comma-separated; `-` prefix for descending. Endpoint-specific allowed fields.
          example: "-created_at,name"
    PageInfo:
      type: object
      required: [page, page_size, has_next, has_prev]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_items:
          type: integer
          nullable: true
          description: May be omitted for performance on some endpoints.
        total_pages:
          type: integer
          nullable: true
        has_next:
          type: boolean
        has_prev:
          type: boolean

    # ----- Common value objects -----
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: string
          description: Decimal string. BigDecimal-safe. Format `\d+\.\d{2}` for MVP (TRY 2 decimals).
          example: "1234.56"
        currency:
          type: string
          example: "TRY"
    Percentage:
      type: string
      description: Decimal string 0.00-100.00.
      example: "20.00"
    Quantity:
      type: string
      description: Decimal string, up to 3 decimal places.
      example: "5.000"
    DateTime:
      type: string
      format: date-time
    Date:
      type: string
      format: date

    # ----- Sale aggregate (DTO names; full props TBD Phase 7) -----
    # POS / Sales
    SaleResponse:
      type: object
      description: "TBD Phase 7. Fields: id, status, store_id, customer_party_id, lines, totals, payment_attempts, completed_at, correlation_id"
    SaleSummary:
      type: object
      description: "TBD Phase 7. Lightweight version of SaleResponse for list views."
    SaleLineResponse:
      type: object
      description: "TBD Phase 7."
    CreateSaleRequest:
      type: object
      description: "TBD Phase 7. Fields: store_id, register_id, customer_party_id?"
    UpdateSaleRequest:
      type: object
      description: "TBD Phase 7."
    AddSaleLineRequest:
      type: object
      description: "TBD Phase 7. Fields: variant_id, quantity"
    UpdateSaleLineRequest:
      type: object
